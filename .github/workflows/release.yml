# Build and publish a GitHub Release when you push a version tag: v1.2.3
# Asset: one zip with universal (arm64+x86_64) Notch Pocket.app, ad-hoc signed.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" || "${VERSION}" == "${TAG}" ]]; then
            echo "error: expected tag like v1.2.3, got: ${TAG}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build universal .app
        env:
          VERSION_OVERRIDE: ${{ steps.ver.outputs.version }}
        run: ./release-package.sh

      - name: Zip app for release asset
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          APP="Notch Pocket-${VERSION}.app"
          OUT="Notch-Pocket-${VERSION}.zip"
          cd releases
          zip -r -y "../${OUT}" "${APP}"
          cd ..
          ls -la "${OUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Notch-Pocket-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
